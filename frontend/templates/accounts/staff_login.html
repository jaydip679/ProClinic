<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | ProClinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="card shadow-sm w-100" style="max-width: 460px;">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h4 mb-0">Staff Portal Login</h1>
                    <a href="{% url 'choose_login' %}" class="btn btn-sm btn-outline-secondary">Back</a>
                </div>
                <p class="text-muted small">Authorized roles: Admin, Doctor, Receptionist, Pharmacist, Accountant</p>

                {% if form.errors %}
                    <div class="alert alert-danger py-2">Please check your credentials and try again.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Username</label>
                        <input type="text" class="form-control" name="username" id="id_username" autocomplete="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">Password</label>
                        <input type="password" class="form-control" name="password" id="id_password" autocomplete="current-password" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">Sign In to Staff Dashboard</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
