<header class="pc-header">
    <div class="pc-header-inner">
        <div class="pc-search">
            <i data-feather="search" style="color: #98a1b3; width: 18px; height: 18px;"></i>
            <input type="text" placeholder="Search patients, doctors...">
        </div>
        <div class="pc-header-actions">
            {% if request.user.is_authenticated %}
                <div style="text-align: right; line-height: 1.2;">
                    <strong style="display: block; font-size: 14px; color: #24323b;">{{ user.get_full_name|default:user.username }}</strong>
                    <span style="font-size: 12px; color: #6f8295;">{{ user.email }}</span>
                </div>
                <span class="pc-role-badge" title="Role View">{{ user.get_role_display|default:user.role }}</span>
            {% endif %}
        </div>
    </div>
</header>
