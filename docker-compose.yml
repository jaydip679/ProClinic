services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proclinic}
      POSTGRES_USER: ${POSTGRES_USER:-proclinic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proclinic_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proclinic_user} -d ${POSTGRES_DB:-proclinic}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Web Application ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python backend/manage.py runserver 0.0.0.0:8000
    volumes:
      # Mount entire project for live code reloading in development
      - .:/app
      # Persist media uploads separately
      - media_files:/app/frontend/media
    ports:
      - "8000:8000"
    environment:
      # Django core
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      # PostgreSQL connection
      DATABASE_URL: postgres://${POSTGRES_USER:-proclinic_user}:${POSTGRES_PASSWORD:-proclinic_pass}@db:5432/${POSTGRES_DB:-proclinic}
      # Redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_files:
