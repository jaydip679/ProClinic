
# render.yaml — Render Blueprint
# Render reads this file automatically when you connect the repo via "New → Blueprint".
# It provisions both the web service and the PostgreSQL database in one click.

services:
  - type: web
    name: proclinic
    runtime: python
    region: singapore          # closest region to India; alternatives: oregon, frankfurt

    buildCommand: "./build.sh"
    startCommand: >-
      cd backend &&
      python manage.py migrate --no-input &&
      python manage.py createsuperuser --noinput || true &&
      gunicorn core.wsgi:application
      --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    autoDeploy: true           # auto-redeploy on every push to main branch
    plan: free                 # 512 MB RAM, 0.1 CPU, spins down after 15 min inactivity


    envVars:
      # ── Django core ──────────────────────────────────────────────────────────
      - key: DEBUG
        value: "False"

      # ── Auto-create admin superuser on first deploy ───────────────────────────
      # createsuperuser --noinput reads these three vars.
      # || true in startCommand prevents re-deploy failure if user already exists.
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin

      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@proclinic.com

      - key: DJANGO_SUPERUSER_PASSWORD
        value: Admin@12345

      - key: SECRET_KEY
        generateValue: true    # Render generates a cryptographically random value

      - key: ALLOWED_HOSTS
        value: ".onrender.com,proclinic-lx2u.onrender.com"

      - key: PYTHON_VERSION
        value: "3.12.3"

      # ── Database ─────────────────────────────────────────────────────────────
      # DATABASE_URL is intentionally NOT stored in this file.
      # Set it manually in: Render Dashboard → proclinic service → Environment → DATABASE_URL
      # Format: postgresql://USER:PASSWORD@HOST:5432/DBNAME
      # Get the value from: Render Dashboard → proclinic-db → Connections → External Database URL
      - key: DATABASE_URL
        sync: false

      # ── Security headers ─────────────────────────────────────────────────────
      - key: SECURE_SSL_REDIRECT
        value: "True"

      - key: SESSION_COOKIE_SECURE
        value: "True"

      - key: CSRF_COOKIE_SECURE
        value: "True"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://proclinic-lx2u.onrender.com"

      - key: SECURE_HSTS_SECONDS
        value: "31536000"

      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"

      - key: SECURE_HSTS_PRELOAD
        value: "True"

      # ── Clinic config ────────────────────────────────────────────────────────
      - key: CONSULTATION_FEE
        value: "500.00"

      - key: GST_RATE
        value: "0.18"

databases:
  - name: proclinic-db
    databaseName: proclinic
    user: proclinic_user
    region: oregon             # DB is hosted in oregon (matches external URL hostname)
    plan: free                 # free tier: 1 GB storage, expires after 90 days
